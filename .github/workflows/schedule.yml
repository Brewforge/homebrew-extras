name: schedule

on:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [fix-*]
  schedule:
    # Every 12 hours
    # - cron: "20 */12 * * *"
    # Every day at 6am
    - cron: "0 6 * * *"
  # allow run manually
  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || github.ref_name }}

permissions: write-all

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1
  HOMEBREW_RELOCATABLE_INSTALL_NAMES: 1

jobs:
  tap-syntax:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name != 'schedule' && !contains(github.event.head_commit.message, 'skip-build'))
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/homebrew/ubuntu22.04:master
    env:
      HOMEBREW_SIMULATE_MACOS_ON_LINUX: 1
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master
        with:
          core: false
          cask: false
          debug: true

      - run: brew test-bot --only-tap-syntax

  bump-casks:
    name: Bump casks
    if: github.repository == 'brewforge/homebrew-extras'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master
        with:
          core: false
          cask: false
          debug: false

      - name: Brew Tap
        uses: ./.github/actions/brew-tap

      - name: Git Cred
        uses: ./.github/actions/git-cred
        with:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}

      - name: Bump
        env:
          HOMEBREW_DEVELOPER: "1"
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        shell: bash -ieo pipefail {0}
        run: |
          rsync -lrv --exclude=.git "$(pwd)" "$(brew --repository brewforge/extras)"
          cd "$(brew --repository brewforge/extras)"
          ./.github/actions/bump-casks/script.sh

  auto-merge-prs:
    name: Auto merge PRs
    needs: bump-casks
    if: github.repository == 'brewforge/homebrew-extras'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto merge PRs
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          # Get all open PRs
          prs=$(gh pr list --repo brewforge/homebrew-extras --state open --json number,headRefName,author --jq '.[] | select(.author.login == "github-actions[bot]" or .author.login == "BrewTestBot") | .number')

          for pr in $prs; do
            echo "Processing PR #$pr"

            if gh pr view "$pr" --repo brewforge/homebrew-extras --json mergeable --jq '.mergeable' | grep -q "MERGEABLE"; then
              echo "Merging PR #$pr"

              # Merge PR
              if gh pr merge "$pr" --repo brewforge/homebrew-extras --merge --delete-branch; then
                echo "Successfully merged PR #$pr and deleted branch"
              else
                echo "Failed to merge PR #$pr"
              fi
            else
              echo "PR #$pr is not mergeable, skipping"
            fi
          done

      - name: Cleanup stale branches
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          echo "Cleaning up stale branches..."

          # Get all branches except main/master and protected branches
          branches=$(gh api repos/brewforge/homebrew-extras/branches --jq '.[] | select(.name != "main" and .name != "master" and .protected == false) | .name')

          for branch in $branches; do
            # Check if branch is associated with any open PR
            pr_count=$(gh pr list --repo brewforge/homebrew-extras --state open --head "$branch" --json number | jq length)

            if [ "$pr_count" -eq 0 ]; then
              # Check last commit date (older than 30 days)
              last_commit_date=$(gh api repos/brewforge/homebrew-extras/commits/$branch --jq '.commit.author.date')
              days_old=$(( ($(date +%s) - $(date -d "$last_commit_date" +%s)) / 86400 ))

              if [ "$days_old" -gt 30 ]; then
                echo "Deleting stale branch: $branch (last commit $days_old days ago)"
                gh api repos/brewforge/homebrew-extras/git/refs/heads/$branch -X DELETE || echo "Failed to delete branch $branch"
              fi
            fi
          done
